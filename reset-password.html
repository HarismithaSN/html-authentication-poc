<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusPe - Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 w-100" style="max-width: 420px;">
 
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2.5rem;"></i>
      <h3 class="card-title-main mt-2">Reset Password</h3>
      <p class="text-muted small">Choose a new strong password.</p>
    </div>
 
    <form id="resetForm" novalidate>
 
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="pass1" class="form-control" placeholder="Min 8 characters" minlength="8" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('pass1')">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="pass2" class="form-control" placeholder="Re-enter password" minlength="8" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('pass2')">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Please confirm your password.</div>
        </div>
      </div>
 
      <div id="resetAlert" class="alert alert-danger d-none">Passwords do not match!</div>
      <div id="resetSuccess" class="alert alert-success d-none">
        <i class="bi bi-check-circle me-2"></i>Password updated successfully!
      </div>
 
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-check2-circle me-2"></i>Update Password
      </button>
 
    </form>
 
    <hr class="my-3">
 
    <div class="text-center">
      <a href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
 
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePass(id) {
    const field = document.getElementById(id);
    field.type = field.type === 'password' ? 'text' : 'password';
  }
 
  document.getElementById('resetForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const p1 = document.getElementById('pass1').value;
    const p2 = document.getElementById('pass2').value;
    const errAlert = document.getElementById('resetAlert');
    const successAlert = document.getElementById('resetSuccess');
 
    if (!this.checkValidity()) {
      this.classList.add('was-validated');
      return;
    }
 
    if (p1 !== p2) {
      errAlert.classList.remove('d-none');
      successAlert.classList.add('d-none');
      return;
    }
 
    errAlert.classList.add('d-none');
    successAlert.classList.remove('d-none');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  });
</script>
</body>
</html>
