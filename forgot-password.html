<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusPe - Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 w-100" style="max-width: 420px;">
 
    <div class="text-center mb-4">
      <i class="bi bi-key-fill text-warning" style="font-size: 2.5rem;"></i>
      <h3 class="card-title-main mt-2">Forgot Password</h3>
      <p class="text-muted small">Enter your email and we'll send you a reset link.</p>
    </div>
 
    <form id="forgotForm" novalidate>
 
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="forgotEmail" class="form-control" placeholder="Enter your email" required>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
      </div>
 
      <div id="forgotSuccess" class="alert alert-success d-none">
        <i class="bi bi-check-circle me-2"></i>Reset link sent! Check your inbox.
      </div>
 
      <button type="submit" class="btn btn-warning w-100 mt-2">
        <i class="bi bi-send me-2"></i>Send Reset Link
      </button>
 
    </form>
 
    <hr class="my-3">
 
    <div class="text-center">
      <a href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
 
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', function (e) {
    e.preventDefault();
    if (!this.checkValidity()) {
      this.classList.add('was-validated');
      return;
    }
    document.getElementById('forgotSuccess').classList.remove('d-none');
    setTimeout(() => {
      window.location.href = 'reset-password.html';
    }, 1500);
  });
</script>
</body>
</html>
