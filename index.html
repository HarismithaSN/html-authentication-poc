<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusPe - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 w-100" style="max-width: 420px;">
 
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill text-primary" style="font-size: 2.5rem;"></i>
      <h3 class="card-title-main mt-2">CampusPe Login</h3>
    </div>
 
    <form id="loginForm" novalidate>
 
      <div class="mb-3">
        <label class="form-label fw-500">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" minlength="8" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('loginPassword')">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>
      </div>
 
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
 
    </form>
 
    <hr class="my-3">
 
    <div class="text-center">
      <a href="forgot-password.html"><i class="bi bi-question-circle me-1"></i>Forgot Password?</a>
    </div>
    <div class="text-center mt-2">
      <a href="register.html"><i class="bi bi-person-plus me-1"></i>New User? Register</a>
    </div>
 
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePass(id) {
    const field = document.getElementById(id);
    field.type = field.type === 'password' ? 'text' : 'password';
  }
 
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    if (!this.checkValidity()) {
      this.classList.add('was-validated');
      return;
    }
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
