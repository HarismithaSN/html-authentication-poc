<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusPe - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
<div class="container d-flex justify-content-center align-items-center py-5 min-vh-100">
  <div class="card p-4 w-100" style="max-width: 420px;">
 
    <div class="text-center mb-4">
      <i class="bi bi-person-circle text-success" style="font-size: 2.5rem;"></i>
      <h3 class="card-title-main mt-2">Create Account</h3>
    </div>
 
    <form id="registerForm" novalidate>
 
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="regName" class="form-control" placeholder="Enter your name" required>
          <div class="invalid-feedback">Name is required.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="regEmail" class="form-control" placeholder="Enter your email" required>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" id="regPhone" class="form-control" placeholder="Enter phone number"
            pattern="[0-9]{10}" required>
          <div class="invalid-feedback">Enter a valid 10-digit phone number.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="regPass" class="form-control" placeholder="Min 8 characters" minlength="8" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('regPass')">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>
      </div>
 
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="regConfirm" class="form-control" placeholder="Re-enter password" required>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('regConfirm')">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback" id="confirmError">Passwords do not match.</div>
        </div>
      </div>
 
      <div id="registerAlert" class="alert alert-danger d-none">Passwords do not match!</div>
 
      <button type="submit" class="btn btn-success w-100 mt-2">
        <i class="bi bi-check-circle me-2"></i>Register
      </button>
 
    </form>
 
    <hr class="my-3">
 
    <div class="text-center">
      <a href="index.html"><i class="bi bi-arrow-left me-1"></i>Already have an account? Login</a>
    </div>
 
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePass(id) {
    const field = document.getElementById(id);
    field.type = field.type === 'password' ? 'text' : 'password';
  }
 
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const pass = document.getElementById('regPass').value;
    const confirm = document.getElementById('regConfirm').value;
    const alert = document.getElementById('registerAlert');
 
    if (!this.checkValidity()) {
      this.classList.add('was-validated');
      return;
    }
 
    if (pass !== confirm) {
      alert.classList.remove('d-none');
      return;
    }
 
    alert.classList.add('d-none');
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
