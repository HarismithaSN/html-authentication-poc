<!DOCTYPE html>
<html>
<head>

<title>Registration Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:400px">

<h3 class="text-center">CampusPe Registration</h3>

<form action="login.html">

<input type="text" class="form-control mb-3" placeholder="Name" required>

<input type="email" class="form-control mb-3" placeholder="Email" required>

<input type="tel" class="form-control mb-3" placeholder="Phone" required>

<div class="mb-3">

<input type="password" id="regpass" class="form-control" placeholder="Password" onkeyup="checkStrength()" required>

<small id="strength"></small>

</div>

<input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Register</button>

</form>

<div class="text-center mt-3">
<a href="login.html">Already have account? Login</a>
</div>

</div>
</div>

<script>

function checkStrength(){

var pass=document.getElementById("regpass").value

var strength=document.getElementById("strength")

if(pass.length<6){
strength.innerHTML="Weak Password"
strength.style.color="red"
}
else if(pass.length<10){
strength.innerHTML="Medium Password"
strength.style.color="orange"
}
else{
strength.innerHTML="Strong Password"
strength.style.color="green"
}

}

</script>

</body>
</html>
