<!DOCTYPE html>
<html>
<head>

<title>Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:350px">

<h3 class="text-center">CampusPe Login</h3>

<form action="dashboard.html">

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">
<input type="password" id="password" class="form-control" required>

<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>

</div>

</div>

<button class="btn btn-primary w-100" onclick="showSpinner(this)">
Login
</button>

</form>

<div class="text-center mt-3">
<a href="forgot-password.html">Forgot Password?</a>
</div>

<div class="text-center mt-2">
<a href="register.html">Register</a>
</div>

<div class="text-center mt-3">
<button class="btn btn-dark btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
</div>

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function showSpinner(btn){

btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> Loading...'

}

function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
